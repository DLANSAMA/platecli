name: CI

# push is limited to master so PR branches don't run everything twice
# (once for the push, once for the pull_request event).
on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Full Python coverage on cheap Linux runners; one smoke job each on
        # macOS (10x minute multiplier) and Windows (2x) at the newest Python.
        os: [ubuntu-latest]
        python-version: ["3.9", "3.12", "3.14"]
        include:
          - os: macos-latest
            python-version: "3.14"
          - os: windows-latest
            python-version: "3.14"

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        shell: bash
        run: |
          uv sync --frozen
          # Seed pip into the uv-created venv: `uv sync` does not install pip, but
          # the "Wheel install smoke" / "Source distribution smoke" steps invoke
          # `python -m pip` and `python -m build`.
          uv pip install pip
          # Put the venv on PATH for later steps. uv places entry-point scripts in
          # .venv/Scripts on Windows and .venv/bin elsewhere. The previous form only
          # handled bin and, under the default Windows pwsh shell, silently no-op'd
          # (`>> $GITHUB_PATH` is not `$env:GITHUB_PATH` in pwsh), leaving Windows on
          # the base interpreter without the installed package. shell: bash + RUNNER_OS
          # makes activation work on every runner.
          if [ "$RUNNER_OS" = "Windows" ]; then
            cygpath -w "$PWD/.venv/Scripts" >> "$GITHUB_PATH"
          else
            echo "$PWD/.venv/bin" >> "$GITHUB_PATH"
          fi


      - name: Unit tests
        run: python -W error::ResourceWarning -m unittest tests.test_bambu

      # pytest + coverage runs in this matrix so a second workflow isn't needed.
      - name: Pytest with coverage
        run: |
          uv pip install '.[test]'
          python -m pytest --cov=bambu_cli

      - name: Syntax smoke
        run: python -m py_compile bambu_cli/__init__.py bambu_cli/bambu.py bambu_cli/cli.py bambu_cli/config.py bambu_cli/slicer.py bambu_cli/commands.py bambu_cli/protocols/ftps.py bambu_cli/protocols/mqtt.py scripts/bambu.py tests/test_bambu.py tests/agent_cli_smoke.py tests/ci_workflow_smoke.py tests/dependency_resolution_smoke.py tests/live_printer_smoke.py tests/package_contents_smoke.py tests/privacy_smoke.py tests/python_compat_smoke.py tests/release_readiness_smoke.py scripts/__init__.py

      - name: CI workflow smoke
        run: python tests/ci_workflow_smoke.py

      - name: Clean generated artifacts before release readiness
        run: |
          # root.rglob('__pycache__')
          # bambu_cli.egg-info
          # 'build', 'dist', 'wheelhouse'
          python scripts/clean_artifacts.py

      - name: Release readiness smoke
        run: python tests/release_readiness_smoke.py

      - name: Python compatibility smoke
        run: python tests/python_compat_smoke.py

      - name: Dependency resolution smoke
        run: python tests/dependency_resolution_smoke.py

      - name: Privacy smoke
        run: python tests/privacy_smoke.py

      - name: CLI help smoke tests
        run: |
          python scripts/bambu.py --help
          python scripts/bambu.py --version
          python scripts/bambu.py status --help
          python scripts/bambu.py download --help
          python scripts/bambu.py upload --help
          python scripts/bambu.py print --help
          python scripts/bambu.py files --help
          python scripts/bambu.py light --help
          python scripts/bambu.py pause --help
          python scripts/bambu.py resume --help
          python scripts/bambu.py stop --help
          python scripts/bambu.py delete --help
          python scripts/bambu.py gcode --help
          python scripts/bambu.py snapshot --help
          python scripts/bambu.py preflight --help
          python scripts/bambu.py doctor --help
          python scripts/bambu.py job --help
          python scripts/bambu.py send --help
          python scripts/bambu.py setup --help
          python scripts/bambu.py slice --help
          bambu-cli --help
          bambu-cli --version

      - name: Installed CLI agent smoke
        env:
          BAMBU_CLI: bambu-cli
        run: python tests/agent_cli_smoke.py

      - name: Wheel install smoke
        env:
          BAMBU_CLI: bambu-cli
        run: |
          python -m pip wheel . -w wheelhouse
          python -m pip install --force-reinstall --no-deps --no-index --find-links wheelhouse bambu-cli
          bambu-cli --help
          python tests/agent_cli_smoke.py

      - name: Source distribution smoke
        run: |
          python -m pip install build
          python -m build --sdist --wheel --outdir dist
          python tests/package_contents_smoke.py
          python tests/python_compat_smoke.py
          python tests/privacy_smoke.py --include-dist
