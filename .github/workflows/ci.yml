name: CI

# push is limited to master so PR branches don't run everything twice
# (once for the push, once for the pull_request event).
on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Full Python coverage on cheap Linux runners; one smoke job each on
        # macOS (10x minute multiplier) and Windows (2x) at the newest Python.
        os: [ubuntu-latest]
        python-version: ["3.9", "3.12", "3.14"]
        include:
          - os: macos-latest
            python-version: "3.14"
          - os: windows-latest
            python-version: "3.14"

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        shell: bash
        run: |
          uv sync --frozen
          # Seed pip into the uv-created venv: `uv sync` does not install pip, but
          # the "Wheel install smoke" / "Source distribution smoke" steps invoke
          # `python -m pip` and `python -m build`.
          uv pip install pip
          # Put the venv on PATH for later steps. uv places entry-point scripts in
          # .venv/Scripts on Windows and .venv/bin elsewhere. The previous form only
          # handled bin and, under the default Windows pwsh shell, silently no-op'd
          # (`>> $GITHUB_PATH` is not `$env:GITHUB_PATH` in pwsh), leaving Windows on
          # the base interpreter without the installed package. shell: bash + RUNNER_OS
          # makes activation work on every runner.
          if [ "$RUNNER_OS" = "Windows" ]; then
            cygpath -w "$PWD/.venv/Scripts" >> "$GITHUB_PATH"
          else
            echo "$PWD/.venv/bin" >> "$GITHUB_PATH"
          fi


      # Single runner: pytest (includes former unittest modules via collection).
      - name: Pytest with coverage
        run: |
          uv pip install '.[test]'
          python -W error::ResourceWarning -m pytest tests/ -m "not live" --cov=bambu_cli --cov-report=term-missing --cov-fail-under=81
      - name: Syntax smoke
        # Auto-discovers bambu_cli/**/*.py (see scripts/syntax_smoke.py).
        run: python scripts/syntax_smoke.py

      - name: CI workflow smoke
        run: python tests/ci_workflow_smoke.py

      - name: Clean generated artifacts before release readiness
        run: |
          # root.rglob('__pycache__')
          # bambu_cli.egg-info
          # 'build', 'dist', 'wheelhouse'
          python scripts/clean_artifacts.py

      - name: Release readiness smoke
        run: python tests/release_readiness_smoke.py

      - name: Python compatibility smoke
        run: python tests/python_compat_smoke.py

      - name: Dependency resolution smoke
        run: python tests/dependency_resolution_smoke.py

      - name: Privacy smoke
        run: python tests/privacy_smoke.py

      - name: CLI help smoke tests
        # Subcommands derived from build_parser() (see scripts/cli_help_smoke.py).
        run: |
          python scripts/cli_help_smoke.py
          bambu-cli --help
          bambu-cli --version

      - name: Installed CLI agent smoke
        env:
          BAMBU_CLI: bambu-cli
        run: python tests/agent_cli_smoke.py

      - name: Wheel install smoke
        env:
          BAMBU_CLI: bambu-cli
        run: |
          python -m pip wheel . -w wheelhouse
          python -m pip install --force-reinstall --no-deps --no-index --find-links wheelhouse bambu-local-cli
          bambu-cli --help
          python tests/agent_cli_smoke.py

      - name: Source distribution smoke
        run: |
          python -m pip install build
          python -m build --sdist --wheel --outdir dist
          python tests/package_contents_smoke.py
          python tests/python_compat_smoke.py
          python tests/privacy_smoke.py --include-dist

  lint:
    name: Lint (ruff + bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: ruff (blocking, correctness rules only)
        run: uvx ruff check bambu_cli
      - name: ruff format (blocking, style consistency)
        run: uvx ruff format --check bambu_cli
      - name: bandit (blocking medium+)
        run: uvx bandit -c pyproject.toml -r bambu_cli -ll
      - name: pip-audit (blocking high+)
        run: |
          uv export --frozen --no-emit-project --format requirements-txt > audit-requirements.txt
          uvx pip-audit -r audit-requirements.txt
      - name: mypy (blocking; full bambu_cli package, check_untyped_defs)
        run: uvx mypy -p bambu_cli
      - name: no test-awareness in production code (blocking)
        run: |
          if grep -rnE 'isinstance\([^)]*\bMock\b|["'"'"']unittest["'"'"'] in sys\.modules' bambu_cli/; then
            echo "::error::Test-awareness branch found in production code (see docs/test-backlog.md ground rules)."
            exit 1
          fi
      - name: sys.exit only at CLI entry (blocking)
        run: |
          if grep -rnE 'sys\.exit\(' bambu_cli/ | grep -v 'bambu_cli/cli.py' | grep -v 'bambu_cli/errors.py'; then
            echo "::error::sys.exit found outside cli entry (domain code must raise BambuError/abort)."
            exit 1
          fi
      - name: no mockable decorator (blocking)
        run: |
          if grep -rnE '@mockable|def mockable' bambu_cli/; then
            echo "::error::@mockable/test indirection found in production code."
            exit 1
          fi
      - name: security + contract markers smoke
        run: |
          uv sync --frozen
          uv pip install '.[test]'
          uv run python -m pytest tests/ -q -m "security or contract" --tb=line