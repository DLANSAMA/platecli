name: CI

# push is limited to master so PR branches don't run everything twice
# (once for the push, once for the pull_request event).
on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Full Python coverage on cheap Linux runners; one smoke job each on
        # macOS (10x minute multiplier) and Windows (2x) at the newest Python.
        os: [ubuntu-latest]
        python-version: ["3.9", "3.12", "3.14"]
        include:
          - os: macos-latest
            python-version: "3.14"
          - os: windows-latest
            python-version: "3.14"

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        shell: bash
        run: |
          uv sync --frozen
          # Seed pip into the uv-created venv: `uv sync` does not install pip, but
          # the "Wheel install smoke" / "Source distribution smoke" steps invoke
          # `python -m pip` and `python -m build`.
          uv pip install pip
          # Put the venv on PATH for later steps. uv places entry-point scripts in
          # .venv/Scripts on Windows and .venv/bin elsewhere. The previous form only
          # handled bin and, under the default Windows pwsh shell, silently no-op'd
          # (`>> $GITHUB_PATH` is not `$env:GITHUB_PATH` in pwsh), leaving Windows on
          # the base interpreter without the installed package. shell: bash + RUNNER_OS
          # makes activation work on every runner.
          if [ "$RUNNER_OS" = "Windows" ]; then
            cygpath -w "$PWD/.venv/Scripts" >> "$GITHUB_PATH"
          else
            echo "$PWD/.venv/bin" >> "$GITHUB_PATH"
          fi


      # Single runner: pytest (includes former unittest modules via collection).
      - name: Pytest with coverage
        run: |
          uv pip install '.[test]'
          python -W error::ResourceWarning -m pytest tests/ -m "not live" --cov=bambu_cli --cov-report=term-missing --cov-fail-under=92
      - name: Syntax smoke
        run: python -m py_compile bambu_cli/__init__.py bambu_cli/bambu.py bambu_cli/cli.py bambu_cli/config.py bambu_cli/constants.py bambu_cli/slicer.py bambu_cli/commands.py bambu_cli/ams.py bambu_cli/download/__init__.py bambu_cli/download/naming.py bambu_cli/download/validation.py bambu_cli/download/html_links.py bambu_cli/download/extract.py bambu_cli/download/downloader.py bambu_cli/job.py bambu_cli/setup_cmd/__init__.py bambu_cli/setup_cmd/common.py bambu_cli/setup_cmd/config_cmd.py bambu_cli/setup_cmd/wizard.py bambu_cli/setup_cmd/migrate.py bambu_cli/setup_cmd/preflight.py bambu_cli/camera.py bambu_cli/printer.py bambu_cli/utils.py bambu_cli/logging_utils.py bambu_cli/protocols/ftps.py bambu_cli/protocols/mqtt.py scripts/bambu.py tests/bambu_test_base.py tests/test_config_and_logging.py tests/test_protocol_clients.py tests/test_cli_entry.py tests/test_printer_commands.py tests/test_slice_cmd.py tests/test_download_cmd.py tests/test_camera_cmd.py tests/test_doctor_and_safety.py tests/agent_cli_smoke.py tests/ci_workflow_smoke.py tests/dependency_resolution_smoke.py tests/live_printer_smoke.py tests/package_contents_smoke.py tests/privacy_smoke.py tests/python_compat_smoke.py tests/release_readiness_smoke.py scripts/__init__.py

      - name: CI workflow smoke
        run: python tests/ci_workflow_smoke.py

      - name: Clean generated artifacts before release readiness
        run: |
          # root.rglob('__pycache__')
          # bambu_cli.egg-info
          # 'build', 'dist', 'wheelhouse'
          python scripts/clean_artifacts.py

      - name: Release readiness smoke
        run: python tests/release_readiness_smoke.py

      - name: Python compatibility smoke
        run: python tests/python_compat_smoke.py

      - name: Dependency resolution smoke
        run: python tests/dependency_resolution_smoke.py

      - name: Privacy smoke
        run: python tests/privacy_smoke.py

      - name: CLI help smoke tests
        run: |
          python scripts/bambu.py --help
          python scripts/bambu.py --version
          python scripts/bambu.py status --help
          python scripts/bambu.py download --help
          python scripts/bambu.py upload --help
          python scripts/bambu.py print --help
          python scripts/bambu.py files --help
          python scripts/bambu.py light --help
          python scripts/bambu.py pause --help
          python scripts/bambu.py resume --help
          python scripts/bambu.py stop --help
          python scripts/bambu.py delete --help
          python scripts/bambu.py gcode --help
          python scripts/bambu.py snapshot --help
          python scripts/bambu.py preflight --help
          python scripts/bambu.py doctor --help
          python scripts/bambu.py job --help
          python scripts/bambu.py send --help
          python scripts/bambu.py setup --help
          python scripts/bambu.py config --help
          python scripts/bambu.py slice --help
          bambu-cli --help
          bambu-cli --version

      - name: Installed CLI agent smoke
        env:
          BAMBU_CLI: bambu-cli
        run: python tests/agent_cli_smoke.py

      - name: Wheel install smoke
        env:
          BAMBU_CLI: bambu-cli
        run: |
          python -m pip wheel . -w wheelhouse
          python -m pip install --force-reinstall --no-deps --no-index --find-links wheelhouse bambu-local-cli
          bambu-cli --help
          python tests/agent_cli_smoke.py

      - name: Source distribution smoke
        run: |
          python -m pip install build
          python -m build --sdist --wheel --outdir dist
          python tests/package_contents_smoke.py
          python tests/python_compat_smoke.py
          python tests/privacy_smoke.py --include-dist

  lint:
    name: Lint (ruff + bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: ruff (blocking, correctness rules only)
        run: uvx ruff check bambu_cli
      - name: ruff format (blocking, style consistency)
        run: uvx ruff format --check bambu_cli
      - name: bandit (blocking medium+)
        run: uvx bandit -c pyproject.toml -r bambu_cli -ll
      - name: pip-audit (blocking high+)
        run: |
          uv export --frozen --no-emit-project --format requirements-txt > audit-requirements.txt
          uvx pip-audit -r audit-requirements.txt
      - name: mypy (blocking; exclude printer/slicer until residual typing fixed)
        run: >
          uvx mypy
          bambu_cli/ams.py bambu_cli/bambu.py bambu_cli/camera.py bambu_cli/cli.py
          bambu_cli/commands.py bambu_cli/config.py bambu_cli/constants.py bambu_cli/context.py
          bambu_cli/errors.py bambu_cli/job.py bambu_cli/logging_utils.py bambu_cli/netsafety.py
          bambu_cli/printables.py bambu_cli/utils.py
          bambu_cli/download bambu_cli/protocols bambu_cli/setup_cmd
      - name: no test-awareness in production code (blocking)
        run: |
          if grep -rnE 'isinstance\([^)]*\bMock\b|["'"'"']unittest["'"'"'] in sys\.modules' bambu_cli/; then
            echo "::error::Test-awareness branch found in production code (see docs/test-backlog.md ground rules)."
            exit 1
          fi
      - name: sys.exit only at CLI entry (blocking)
        run: |
          if grep -rnE 'sys\.exit\(' bambu_cli/ | grep -v 'bambu_cli/cli.py' | grep -v 'bambu_cli/errors.py'; then
            echo "::error::sys.exit found outside cli entry (domain code must raise BambuError/abort)."
            exit 1
          fi
      - name: no mockable decorator (blocking)
        run: |
          if grep -rnE '@mockable|def mockable' bambu_cli/; then
            echo "::error::@mockable/test indirection found in production code."
            exit 1
          fi
      - name: security + contract markers smoke
        run: |
          uv pip install '.[test]'
          uv run python -m pytest tests/ -q -m "security or contract" --tb=line